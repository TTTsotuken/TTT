<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>翻訳チャットアプリ</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">
    <div id="app">
        <div class="min-h-screen bg-gradient-to-br from-blue-50 to-indigo-100 flex items-center justify-center p-4">
            <div class="bg-white rounded-2xl shadow-xl p-8 w-full max-w-md text-center">
                <div class="text-6xl mb-4">⏳</div>
                <p class="text-lg font-medium text-gray-700">読み込み中...</p>
            </div>
        </div>
    </div>
    
    <!-- 設定を最初に読み込む -->
    <script src="./js/config.js"></script>
    
    <!-- Firebase Serviceをインラインで読み込む -->
    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
        import { getDatabase, ref, get, set, update, remove, onValue, off, serverTimestamp, push } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js';
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';

        // Firebase初期化
        const app = initializeApp(CONFIG.firebase);
        const database = getDatabase(app);
        const auth = getAuth(app);

        class FirebaseService {
            constructor() {
                this.app = app;
                this.database = database;
                this.initialized = true;
            }

            ref(path) {
                return ref(this.database, path);
            }

            async get(path) {
                const snapshot = await get(this.ref(path));
                return snapshot.val();
            }

            async set(path, data) {
                await set(this.ref(path), data);
            }

            async update(path, data) {
                await update(this.ref(path), data);
            }

            async remove(path) {
                await remove(this.ref(path));
            }

            onValue(path, callback) {
                return onValue(this.ref(path), callback);
            }

            off(path, callback) {
                off(this.ref(path), callback);
            }

            getServerTimestamp() {
                return serverTimestamp();
            }

            push(path) {
                return push(this.ref(path));
            }
        }

        window.firebaseService = new FirebaseService();
        console.log('✅ Firebase Service セット完了');

        class AdminAuthService {
            constructor() {
                this.auth = auth;
                this.currentUser = null;
                
                onAuthStateChanged(this.auth, (user) => {
                    this.currentUser = user;
                    console.log('認証状態:', user ? '✅ ログイン中' : '❌ 未ログイン');
                });
            }

            async login(email, password) {
                try {
                    const userCredential = await signInWithEmailAndPassword(this.auth, email, password);
                    console.log('✅ Firebase認証成功');
                    return { success: true, user: userCredential.user };
                } catch (error) {
                    console.error('❌ Firebase認証失敗:', error.code);
                    
                    let errorMessage = 'ログインに失敗しました';
                    if (error.code === 'auth/invalid-credential' || error.code === 'auth/wrong-password' || error.code === 'auth/user-not-found') {
                        errorMessage = 'メールアドレスまたはパスワードが正しくありません';
                    } else if (error.code === 'auth/too-many-requests') {
                        errorMessage = '試行回数が多すぎます。しばらく待ってから再試行してください';
                    } else if (error.code === 'auth/invalid-email') {
                        errorMessage = 'メールアドレスの形式が正しくありません';
                    }
                    
                    return { success: false, error: errorMessage };
                }
            }

            async logout() {
                try {
                    await signOut(this.auth);
                    console.log('✅ ログアウト成功');
                    return { success: true };
                } catch (error) {
                    console.error('❌ ログアウト失敗:', error);
                    return { success: false };
                }
            }

            isLoggedIn() {
                return this.currentUser !== null;
            }

            generateInviteToken(roomId, password) {
                const data = `${roomId}:${password}:${Date.now()}`;
                return btoa(data);
            }

            validateInviteToken(token) {
                try {
                    const decoded = atob(token);
                    const parts = decoded.split(':');
                    if (parts.length === 3) {
                        return {
                            valid: true,
                            roomId: parts[0],
                            password: parts[1],
                            timestamp: parseInt(parts[2])
                        };
                    }
                } catch (e) {
                    console.error('トークン検証エラー:', e);
                }
                return { valid: false };
            }
        }

        window.adminAuthService = new AdminAuthService();
        console.log('✅ Admin Auth Service 初期化完了');
    </script>
    
    <!-- 🆕 Google Translate翻訳サービスを読み込む -->
    <script src="./js/google-translate-service.js"></script>
    
    <!-- 他のサービスを読み込む -->
    <script src="./js/auth-service.js"></script>
    <script src="./js/chat-service.js"></script>
    
    <!-- 最後にアプリを読み込む -->
    <script>
        window.addEventListener('load', () => {
            console.log('Services check:', {
                firebase: !!window.firebaseService,
                translation: !!window.googleTranslateService,
                auth: !!window.authService,
                chat: !!window.chatService,
                adminAuth: !!window.adminAuthService
            });
            
            window.firebaseServiceReady = true;
            window.dispatchEvent(new Event('firebaseServiceReady'));
        });
    </script>
    <script src="./js/app.js"></script>
</body>
</html>
